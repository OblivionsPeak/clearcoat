<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>engine smoke</title></head>
<body><pre id="out">running…</pre>
<script type="module">
import { createDoc, createTextLayer, regenerateText, createFillLayer, fillPaintStyle,
         createImageLayer, createMaskedPatternLayer, renderPaint, renderSpec, serializeDoc,
         layerMatrix, SIZE }
  from '../js/engine.js';
import { advise } from '../js/advisor.js';
import { specTexture, MATERIALS } from '../js/engine.js';

const lines = [];
const ok = (name, cond) => lines.push((cond ? 'PASS' : 'FAIL') + ' ' + name);
try {
  // curved text
  const t = createTextLayer();
  t.text = 'CURVED TEXT'; t.curve = 120; t.outlineWidth = 4;
  regenerateText(t);
  ok('curved-text-raster', t.img && t.img.width > 50 && t.img.height > 50);
  t.curve = -90; regenerateText(t);
  ok('curved-text-negative', t.img && t.img.width > 50);

  // 3-stop gradient
  const f = createFillLayer('#ff0000');
  f.fillType = 'linear'; f.colorMid = '#00ff00'; f.midPos = 0.4;
  const c2 = document.createElement('canvas'); c2.width = c2.height = 64;
  const style = fillPaintStyle(c2.getContext('2d'), f, 0, 0, 64, 64);
  ok('gradient-mid-stop', style && typeof style !== 'string');

  // masked pattern layer
  const mask = document.createElement('canvas'); mask.width = mask.height = SIZE;
  const mctx = mask.getContext('2d'); mctx.fillStyle = '#fff'; mctx.fillRect(200, 200, 800, 800);
  const tile = document.createElement('canvas'); tile.width = tile.height = 32;
  const tctx = tile.getContext('2d'); tctx.fillStyle = '#f0f'; tctx.fillRect(0, 0, 32, 16);
  const mp = createMaskedPatternLayer(mask, tile, 'test fill');
  ok('masked-pattern-layer', mp.type === 'image' && mp.scale === 1 && mp.x === SIZE / 2);
  // (500,490) sits in the opaque half of the 32px tile AND inside the mask;
  // (50,42) is in the opaque tile half but OUTSIDE the mask
  const a = mp.img.getContext('2d').getImageData(500, 490, 1, 1).data[3];
  const b = mp.img.getContext('2d').getImageData(50, 42, 1, 1).data[3];
  ok('masked-pattern-clip', a > 0 && b === 0);

  // fx compositing through the full paint + spec pipeline
  const doc = createDoc();
  const il = createImageLayer(tile, tile.toDataURL(), 'logo');
  il.fx = { strokeW: 8, strokeColor: '#00ff00', shadow: 12, shadowDX: 8, shadowDY: 8,
            shadowColor: '#000000', glow: 10, glowColor: '#ffffff' };
  doc.layers.push(il, t, mp);
  const paint = renderPaint(doc);
  const spec = renderSpec(doc);
  ok('render-paint-with-fx', paint && paint.width === SIZE);
  ok('render-spec-with-fx', spec && spec.width === SIZE);

  // luminance-driven spec: dark paint bakes oxide, bright paint keeps the material
  const wdoc = createDoc();
  const wtile = document.createElement('canvas'); wtile.width = wtile.height = SIZE;
  const wctx = wtile.getContext('2d');
  wctx.fillStyle = '#000'; wctx.fillRect(0, 0, SIZE / 2, SIZE);
  wctx.fillStyle = '#fff'; wctx.fillRect(SIZE / 2, 0, SIZE / 2, SIZE);
  const wl = createImageLayer(wtile, wtile.toDataURL(), 'weathered');
  wl.scale = 1; // factory fits imports to half the sheet — cover it fully
  wl.material = 'chrome';
  wl.lumSpec = { amt: 100, invert: false };
  wdoc.layers.push(wl);
  const wspec = renderSpec(wdoc).getContext('2d').getImageData(0, 0, SIZE, SIZE).data;
  const at = (x, y) => { const i = (y * SIZE + x) * 4; return [wspec[i], wspec[i + 1], wspec[i + 2]]; };
  const dark = at(200, 1024), bright = at(1800, 1024);
  ok('lumspec-dark-is-oxide', dark[0] === 0 && dark[1] === 235 && dark[2] === 30);
  ok('lumspec-bright-is-material', bright[0] === 255 && bright[1] === 10 && bright[2] === 255);

  // color separation: canvas → detect → split → canvas round-trip
  const sep = await import('../js/separate.js');
  const scan = document.createElement('canvas'); scan.width = scan.height = 256;
  const scx = scan.getContext('2d');
  scx.fillStyle = '#c81e1e'; scx.fillRect(0, 0, 192, 256);
  scx.fillStyle = '#1e1ec8'; scx.fillRect(192, 0, 64, 256);
  const sdata = scx.getImageData(0, 0, 256, 256);
  const spal = sep.detectPalette(sdata.data, { step: 1 });
  const sparts = sep.splitByPalette(sdata.data, spal);
  ok('separate-two-colors', spal.length === 2 && sparts.length === 2);
  const pc = document.createElement('canvas'); pc.width = pc.height = 256;
  pc.getContext('2d').putImageData(new ImageData(sparts[0].data, 256, 256), 0, 0);
  const pd = pc.getContext('2d').getImageData(100, 128, 1, 1).data;
  const pd2 = pc.getContext('2d').getImageData(220, 128, 1, 1).data;
  ok('separate-part-pixels', pd[3] === 255 && pd[0] > 150 && pd2[3] === 0);

  // non-uniform stretch: scaleY flows through layerMatrix and serializes;
  // null scaleY must keep following scale (uniform, back-compat)
  const stretchy = createImageLayer(tile, tile.toDataURL(), 'flag');
  stretchy.scale = 2; stretchy.scaleY = 0.5;
  const mtx = layerMatrix(stretchy);
  const right = mtx.transformPoint(new DOMPoint(16, 0));
  const down = mtx.transformPoint(new DOMPoint(0, 16));
  ok('stretch-matrix', Math.abs((right.x - stretchy.x) - 32) < 0.01 &&
                       Math.abs((down.y - stretchy.y) - 8) < 0.01);
  const uniDown = layerMatrix(il).transformPoint(new DOMPoint(0, 16));
  ok('stretch-null-follows-scale', Math.abs((uniDown.y - il.y) - 16 * il.scale) < 0.01);
  doc.layers.push(stretchy);

  // serialization round-trip fields
  const s = serializeDoc(doc);
  const st = s.layers.find(l => l.type === 'text');
  const si = s.layers.find(l => l.name === 'logo');
  ok('serialize-curve', st.curve === -90);
  ok('serialize-fx', si.fx && si.fx.strokeW === 8);
  const sf = s.layers.find(l => l.name === 'flag');
  ok('serialize-scaley', sf.scaleY === 0.5 && si.scaleY === null);

  // advisor: symptom queries route to the fixes knowledge base
  const mdoc = createDoc();
  mdoc.baseMaterial = 'matte';
  const a1 = advise('My livery is muted how do I fix it', mdoc);
  ok('advisor-muted', a1.title === 'Looks muted / washed out' && a1.tips.length >= 3);
  ok('advisor-muted-names-matte', a1.tips[0].toLowerCase().includes('matte'));
  const a2 = advise('chrome looks grey in the sim', mdoc);
  ok('advisor-chrome', a2.title === 'Chrome looks grey / dead');
  const a3 = advise('make it look aggressive', mdoc);
  ok('advisor-look-still-works', a3.title === 'Aggressive / mean');
  const a4 = advise("numbers can't be read at distance", mdoc);
  ok('advisor-legibility', a4.title === 'Numbers / logos hard to read');

  // glitter material: registered + generates a spec texture with chip variance
  ok('glitter-material', MATERIALS.glitter && MATERIALS.glitter.tex === 'glitter');
  const gt = specTexture('glitter', { met: 170, rough: 60, clear: 255, density: 30, scale: 4, contrast: 100 });
  const gd = gt.getContext('2d').getImageData(0, 0, 256, 1).data;
  let minMet = 255, maxMet = 0;
  for (let i = 0; i < gd.length; i += 4) { minMet = Math.min(minMet, gd[i]); maxMet = Math.max(maxMet, gd[i]); }
  ok('glitter-chips-vary', maxMet - minMet > 30); // chips spike metallic over the base
} catch (err) {
  lines.push('THROW ' + err.message);
}
document.getElementById('out').textContent = lines.join('\n') + '\nDONE';
</script></body></html>
